name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-release:
    name: Verify release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify tag, main, package version, and changelog agree
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          test "$RELEASE_TAG" = "v$version"
          git fetch origin main
          # The tag must be ON the main line, but need not be the exact HEAD:
          # commits can legitimately land after an auto-tag is pushed. Requiring
          # exact equality made releases fail whenever main advanced by even one
          # commit. Ancestor-of-main is the correct, race-free invariant.
          git merge-base --is-ancestor "$RELEASE_TAG" origin/main
          grep -q "^version = \"$version\"$" Cargo.toml
          grep -q "^## \[$version\]" CHANGELOG.md
          tauri_version="$(python3 -c 'import json; print(json.load(open("crates/openfang-desktop/tauri.conf.json"))["version"])')"
          test "$tauri_version" = "$version"

  # ── Tauri Desktop App (Windows + macOS + Linux) ───────────────────────────
  # Produces: .msi, .exe (Windows) | .dmg, .app (macOS) | .AppImage, .deb (Linux)
  # Also generates and uploads latest.json (the auto-updater manifest)
  desktop:
    name: Desktop / ${{ matrix.platform.name }}
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            os: ubuntu-22.04
            args: "--target x86_64-unknown-linux-gnu"
            rust_target: x86_64-unknown-linux-gnu

          - name: macOS x86_64
            os: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin

          - name: macOS ARM64
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin

          - name: Windows x86_64
            os: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust_target: x86_64-pc-windows-msvc

          - name: Windows ARM64
            os: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            rust_target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform.os }}
    env:
      # secrets aren't allowed in step-level `if:` expressions, so expose
      # certificate presence as a job-level env flag instead.
      HAS_MAC_CERT: ${{ secrets.MAC_CERT_BASE64 != '' }}
      HAS_NOTARIZE: ${{ secrets.MAC_NOTARIZE_TEAM_ID != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.platform.rust_target }}

      - name: Import macOS signing certificate
        # Skip when Apple certificates aren't configured — the build then
        # produces an unsigned .dmg (users right-click -> Open past Gatekeeper)
        # instead of failing the whole macOS desktop job.
        if: runner.os == 'macOS' && env.HAS_MAC_CERT == 'true'
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$MAC_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/certificate.p12 -P "$MAC_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Using signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Use ad-hoc signing when no Apple certificate is configured
        # Without this, tauri attempts codesign with an empty identity and
        # the bundle step fails ("failed to sign app"). "-" = ad-hoc signing:
        # the .dmg builds and runs via right-click -> Open.
        if: runner.os == 'macOS' && env.HAS_MAC_CERT != 'true'
        run: echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV

      - name: Export notarization credentials
        # Only set notarization env vars when all three secrets are configured.
        # When unset, Tauri skips notarization (producing an unsigned .dmg).
        if: runner.os == 'macOS' && env.HAS_NOTARIZE == 'true'
        run: |
          echo "APPLE_ID=${{ secrets.MAC_NOTARIZE_APPLE_ID }}" >> $GITHUB_ENV
          echo "APPLE_PASSWORD=${{ secrets.MAC_NOTARIZE_PASSWORD }}" >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=${{ secrets.MAC_NOTARIZE_TEAM_ID }}" >> $GITHUB_ENV

      - name: Build and bundle Tauri desktop app
        uses: tauri-apps/tauri-action@v1
        # NOTE: do NOT list APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID here.
        # `env: FOO: ${{ env.FOO }}` defines FOO as an EMPTY STRING when it is
        # unset, and Tauri treats a *present* APPLE_ID as "notarize this build",
        # then aborts with "Team ID must be at least 3 characters". The
        # conditional step above writes them to $GITHUB_ENV, which already
        # propagates to this step when the secrets are configured — so
        # notarization still happens when set up, and is cleanly skipped
        # (unsigned .dmg) when it is not.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FreEco.ai ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            See the [CHANGELOG](https://github.com/FreecoDAO/FreEco-ai/blob/main/CHANGELOG.md) for full details.

            ## Installation

            **Desktop App** — Download the installer for your platform below.

            **CLI (Linux/macOS)**:
            ```bash
            curl -sSf https://www.freeco.ai | sh
            ```

            **Docker**:
            ```bash
            docker pull ghcr.io/freecodao/freeco-ai:latest
            ```

            **Coming from OpenClaw?**
            ```bash
            openfang migrate --from openclaw
            ```
          # Build into a DRAFT. This repo has GitHub "immutable releases"
          # enabled: once a release is published its assets are frozen, so the
          # first matrix job to publish would lock every other job out with
          # "Cannot upload asset ... to an immutable release". All jobs upload
          # to the draft; the publish-release job flips it live at the end.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          projectPath: crates/openfang-desktop
          args: ${{ matrix.platform.args }}

  # ── CLI Binary (7 platforms) ──────────────────────────────────────────────
  cli:
    name: CLI / ${{ matrix.target }}
    needs: verify-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Install cross (Linux aarch64/armv7)
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      - name: Build CLI (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: cross build --release --target ${{ matrix.target }} --bin openfang
      - name: Build CLI
        if: matrix.target != 'aarch64-unknown-linux-gnu' && matrix.target != 'armv7-unknown-linux-gnueabihf'
        run: cargo build --release --target ${{ matrix.target }} --bin openfang
      - name: Ad-hoc codesign CLI binary (macOS)
        if: runner.os == 'macOS'
        run: |
          xattr -cr target/${{ matrix.target }}/release/openfang || true
          codesign --force --sign - target/${{ matrix.target }}/release/openfang
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../openfang-${{ matrix.target }}.tar.gz openfang
          cd ../../..
          sha256sum openfang-${{ matrix.target }}.tar.gz > openfang-${{ matrix.target }}.tar.gz.sha256
      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/openfang.exe" -DestinationPath "openfang-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "openfang-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  openfang-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "openfang-${{ matrix.target }}.zip.sha256"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: openfang-${{ matrix.target }}.*
          # Keep the release a draft while assets land — see releaseDraft note
          # in the desktop job (immutable releases reject post-publish uploads).
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker (linux/amd64 + linux/arm64) ────────────────────────────────────
  docker:
    name: Docker Image
    needs: verify-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/freecodao/freeco-ai:latest
            ghcr.io/freecodao/freeco-ai:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/FreecoDAO/FreEco-ai
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.description=OpenFang Agent OS — single-binary Rust agent framework
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Set GHCR package visibility to public
        # FreecoDAO is a user account, not an org — the /orgs/... endpoint
        # 404s. Best-effort: the users endpoint, and never fail the release
        # over package visibility (it can be set once in the UI instead).
        run: |
          curl -fsSL -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/users/FreecoDAO/packages/container/freeco-ai \
            -d '{"visibility":"public"}' \
          || echo "Package visibility unchanged (set it once via GitHub UI: Packages -> freeco-ai -> settings)"

  # ── Publish the draft once every artifact is uploaded ─────────────────────
  # GitHub "immutable releases" freeze a release's assets the moment it is
  # published, so the desktop/cli jobs build into a DRAFT. This job flips it
  # live after all of them succeed. Docker is intentionally not a dependency:
  # it publishes to GHCR, not to the release, and must not gate the download
  # links.
  publish-release:
    name: Publish release
    needs: [desktop, cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Flip draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false --latest
          echo "Published ${{ github.ref_name }} with all assets attached."
