version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    # Keep Cargo updates together so security fixes receive one compatibility
    # review and one validated release instead of a queue of unrelated PRs.
    open-pull-requests-limit: 1
    groups:
      cargo:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
