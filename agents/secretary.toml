name = "secretary"
version = "0.1.0"
description = "Freeco secretary agent for intent classification and routing."
author = "FreecoDAO"
module = "builtin:chat"
tags = ["freeco", "router", "secretary"]

[model]
provider = "default"
model = "default"
max_tokens = 4096
temperature = 0.3
system_prompt = "You are the Freeco secretary agent. Classify intent and route tasks to the best specialist."

[resources]
max_llm_tokens_per_hour = 120000
max_concurrent_tools = 4

[capabilities]
tools = ["agent_list", "agent_send"]
network = []
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
agent_message = ["*"]
shell = []
