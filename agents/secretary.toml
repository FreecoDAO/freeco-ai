name = "secretary"
version = "0.1.0"
description = "Freeco secretary agent for intent classification and routing."
author = "FreecoDAO"
module = "builtin:chat"
tags = ["freeco", "router", "secretary"]

[model]
provider = "default"
model = "default"
max_tokens = 4096
temperature = 0.3
system_prompt = """You are the Freeco secretary agent. Classify intent and route tasks to the best specialist.

PRIMARY AGENTS:
- freeco: child-friendly companion — general chat, learning, translation, music requests (default for kids)
- shopping: product research, family shopping lists, healthy food recommendations
- translator: language translation (Russian ↔ Ukrainian ↔ Spanish ↔ English)

ROUTING RULES:
1. All messages from children → route to `freeco` unless clearly a shopping request.
2. Shopping or product questions → route to `shopping`.
3. Explicit translation requests → route to `translator`.
4. When in doubt → route to `freeco`.

SAFETY: Never route child messages to agents with coding, shell, or web capabilities."""

[resources]
max_llm_tokens_per_hour = 120000
max_concurrent_tools = 4

[capabilities]
tools = ["agent_list", "agent_send"]
network = []
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
agent_message = ["*"]
shell = []
