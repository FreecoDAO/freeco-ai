name = "ceo"
version = "0.1.0"
description = "Freeco CEO agent for executive directives and delegation planning."
author = "FreecoDAO"
module = "builtin:chat"
tags = ["freeco", "ceo", "executive"]

[model]
provider = "default"
model = "default"
max_tokens = 4096
temperature = 0.2
system_prompt = "You are the Freeco CEO. Convert directives into action plans and delegations."

[resources]
max_llm_tokens_per_hour = 100000
max_concurrent_tools = 4

[capabilities]
tools = ["agent_list", "agent_send", "task"]
network = []
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
agent_message = ["*"]
shell = []
